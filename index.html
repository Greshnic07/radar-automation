<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="refresh" content="600">
    <meta charset="UTF-8">
    <title>DODO TV RADAR</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: url('фон.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 2vh;
        }
        /* Блок со временем обновления под лого */
        .update-info {
            position: absolute;
            top: 7vh;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444; /* Красный, как ты просил */
            font-size: 2vh;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.8);
            padding: 0.5vh 2vw;
            border-radius: 1vh;
            z-index: 10;
        }
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2vw;
            height: 100%;
            margin-top: 2vh;
        }
        .column {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .header {
            height: 8vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5vh;
            font-weight: 900;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
            text-transform: uppercase;
            margin-bottom: 1vh;
        }
        .card-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            min-height: 0;
        }
        .card {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border: 0.6vh solid #ff6900;
            border-radius: 3vh;
            padding: 2vh;
            display: flex;
            flex-direction: column;
            min-height: 0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1vh;
            flex-shrink: 0;
        }
        .author-info { max-width: 65%; }
        .author { font-size: 3.5vh; font-weight: bold; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .location { font-size: 1.8vh; color: #555; }
        .stars { font-size: 4vh; color: #ffcc00; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        .badge {
            background: #ff6900; color: white;
            padding: 0.4vh 1.5vh; border-radius: 1vh;
            font-size: 1.6vh; font-weight: bold;
            display: inline-block; margin-bottom: 1vh;
            align-self: flex-start;
        }

        .text-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .review-text {
            width: 100%;
            font-size: 3vh;
            line-height: 1.3;
            color: #111;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="update-info" id="last-update">Обновление...</div>

    <div class="main-container">
        <div class="column">
            <div class="header">ЯНДЕКС КАРТЫ</div>
            <div class="card-wrapper">
                <div class="card">
                    <div class="badge">ПОСЛЕДНИЙ</div>
                    <div class="card-header">
                        <div class="author-info"><span class="author" id="y1-author">...</span><span class="location" id="y1-loc">...</span></div>
                        <div class="stars" id="y1-stars"></div>
                    </div>
                    <div class="text-area"><div class="review-text" id="y1-text">Загрузка...</div></div>
                </div>
                <div class="card">
                    <div class="badge" style="background:#666">ПРЕДПОСЛЕДНИЙ</div>
                    <div class="card-header">
                        <div class="author-info"><span class="author" id="y2-author">...</span><span class="location" id="y2-loc">...</span></div>
                        <div class="stars" id="y2-stars"></div>
                    </div>
                    <div class="text-area"><div class="review-text" id="y2-text">Загрузка...</div></div>
                </div>
            </div>
        </div>

        <div class="column">
            <div class="header">2ГИС</div>
            <div class="card-wrapper">
                <div class="card">
                    <div class="badge">ПОСЛЕДНИЙ</div>
                    <div class="card-header">
                        <div class="author-info"><span class="author" id="g1-author">...</span><span class="location" id="g1-loc">...</span></div>
                        <div class="stars" id="g1-stars"></div>
                    </div>
                    <div class="text-area"><div class="review-text" id="g1-text">Загрузка...</div></div>
                </div>
                <div class="card">
                    <div class="badge" style="background:#666">ПРЕДПОСЛЕДНИЙ</div>
                    <div class="card-header">
                        <div class="author-info"><span class="author" id="g2-author">...</span><span class="location" id="g2-loc">...</span></div>
                        <div class="stars" id="g2-stars"></div>
                    </div>
                    <div class="text-area"><div class="review-text" id="g2-text">Загрузка...</div></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function fitText(el) {
            let fontSize = 3;
            el.style.fontSize = fontSize + "vh";
            const parent = el.parentElement;
            while (el.scrollHeight > parent.clientHeight && fontSize > 1.5) {
                fontSize -= 0.1;
                el.style.fontSize = fontSize + "vh";
            }
        }

        async function update() {
            try {
                const response = await fetch('tv_data.json?t=' + Date.now());
                const data = await response.json();
                
                // Ставим время обновления
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                                now.getMinutes().toString().padStart(2, '0');
                document.getElementById('last-update').innerText = "ОБНОВЛЕНО В " + timeStr;

                const yandexList = Array.isArray(data.yandex) ? data.yandex : [];
                const gisList = Array.isArray(data.gis) ? data.gis : [];

                const map = [
                    {id: 'y1', d: yandexList[0]},
                    {id: 'y2', d: yandexList[1]},
                    {id: 'g1', d: gisList[0]},
                    {id: 'g2', d: gisList[1]}
                ];

                map.forEach(m => {
                    if (m.d) {
                        document.getElementById(m.id + '-author').innerText = m.d.author;
                        document.getElementById(m.id + '-loc').innerText = m.d.location;
                        document.getElementById(m.id + '-stars').innerText = m.d.stars;
                        const textEl = document.getElementById(m.id + '-text');
                        textEl.innerText = m.d.text;
                        setTimeout(() => fitText(textEl), 50);
                    }
                });
            } catch(e) { 
                console.error("Ошибка загрузки данных:", e); 
            }
        }

        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
