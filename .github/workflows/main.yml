name: Radar Automation

on:
  workflow_dispatch: # Позволяет запускать скрипт вручную по кнопке

  schedule:
    # ВАЖНО: Время тут указывается в UTC! 
    # В Ижевске часовой пояс UTC+4. 
    # Чтобы скрипт сработал в 13:57 по Ижевску, тут нужно написать 09:57.
    - cron: '57 9 * * *'
    - cron: '57 13 * * *' # Это 17:57 по Ижевску

jobs:
  run-radar:
    runs-on: ubuntu-latest # Бесплатный линукс-сервер от GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp requests python-dotenv selenium
          
      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Review Radar script
        env:
          MY_LOGIN: ${{ secrets.MY_LOGIN }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          MY_TOTP: ${{ secrets.MY_TOTP }}
        run: python review_radar.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Update radar data" || echo "Ничего нового не нашлось"
          git push || echo "Нечего пушить"
