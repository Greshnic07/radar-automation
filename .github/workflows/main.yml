name: Radar Automation

on:
  schedule:
    # Запуск дважды в час: в 12 и 42 минуты. 
    # Неровные числа помогают обходить очереди Гитхаба.
    - cron: '12,42 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Обновил до v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Обновил до v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp requests python-dotenv selenium
          
      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Review Radar script
        env:
          MY_LOGIN: ${{ secrets.MY_LOGIN }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          MY_TOTP: ${{ secrets.MY_TOTP }}
        run: python review_radar.py

      - name: Commit and Push changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.png 2>/dev/null || true
          git commit -am "Auto-update data" || echo "Nothing to commit"
          git push
