name: Radar Automation

on:
  schedule:
    - cron: '38 * * * *'
  workflow_dispatch:

# ДОБАВЬ ЭТИ ТРИ СТРОЧКИ, ЧТОБЫ PUSH НЕ БЛОКИРОВАЛСЯ:
permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp requests python-dotenv selenium
          
      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Review Radar script
        env:
          MY_LOGIN: ${{ secrets.MY_LOGIN }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          MY_TOTP: ${{ secrets.MY_TOTP }}
        run: python review_radar.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Update radar data" || echo "No changes"
          git push || echo "Nothing to push"
